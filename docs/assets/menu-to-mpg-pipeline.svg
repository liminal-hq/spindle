<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1120 360" role="img" aria-labelledby="title desc">
  <title id="title">Menu to MPG pipeline</title>
  <desc id="desc">Animated pipeline showing menu render, overlay generation, spumux composition, and dvdauthor handoff.</desc>
  <defs>
    <linearGradient id="panel" x1="0" x2="1">
      <stop offset="0%" stop-color="#101218"/>
      <stop offset="100%" stop-color="#171a22"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" x2="1">
      <stop offset="0%" stop-color="#ffaa40"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
    <style>
      .bg { fill: #050507; }
      .box { fill: url(#panel); stroke: rgba(255,255,255,0.12); stroke-width: 1; rx: 18; }
      .title { fill: #f8fafc; font: 600 20px Inter, Arial, sans-serif; }
      .copy { fill: #94a3b8; font: 13px Inter, Arial, sans-serif; }
      .pipe { fill: none; stroke: rgba(255,255,255,0.16); stroke-width: 3; stroke-dasharray: 10 10; }
      .dot { fill: #ffaa40; }
      .token { fill: #22d3ee; }
      @keyframes dash {
        to { stroke-dashoffset: -40; }
      }
      .animated { animation: dash 2.8s linear infinite; }
    </style>
  </defs>

  <rect class="bg" width="1120" height="360" rx="28"/>

  <rect class="box" x="40" y="106" width="180" height="140" rx="18"/>
  <text class="title" x="64" y="142">Menu Model</text>
  <text class="copy" x="64" y="170">buttons</text>
  <text class="copy" x="64" y="192">labels</text>
  <text class="copy" x="64" y="214">highlight palette</text>

  <rect class="box" x="272" y="78" width="190" height="196" rx="18"/>
  <text class="title" x="296" y="114">RenderMenu</text>
  <text class="copy" x="296" y="142">ffmpeg</text>
  <text class="copy" x="296" y="166">background</text>
  <text class="copy" x="296" y="188">button boxes</text>
  <text class="copy" x="296" y="210">drawtext labels</text>
  <text class="copy" x="296" y="232">base MPEG-2 menu</text>

  <rect class="box" x="516" y="78" width="190" height="196" rx="18"/>
  <text class="title" x="540" y="114">Overlay Images</text>
  <text class="copy" x="540" y="142">ffmpeg</text>
  <text class="copy" x="540" y="166">highlight PNG</text>
  <text class="copy" x="540" y="188">select PNG</text>
  <text class="copy" x="540" y="210">button rectangles</text>

  <rect class="box" x="760" y="78" width="190" height="196" rx="18"/>
  <text class="title" x="784" y="114">spumux</text>
  <text class="copy" x="784" y="142">button XML</text>
  <text class="copy" x="784" y="166">nav references</text>
  <text class="copy" x="784" y="188">subpicture mux</text>
  <text class="copy" x="784" y="210">final menu MPG</text>

  <rect class="box" x="972" y="106" width="108" height="140" rx="18"/>
  <text class="title" x="992" y="142">dvd</text>
  <text class="copy" x="992" y="170">dvdauthor</text>
  <text class="copy" x="992" y="194">VMGM/VTS</text>

  <path id="pipe1" class="pipe animated" d="M220 176 C248 176, 248 176, 272 176"/>
  <path id="pipe2" class="pipe animated" d="M462 176 C488 176, 488 176, 516 176"/>
  <path id="pipe3" class="pipe animated" d="M706 176 C732 176, 732 176, 760 176"/>
  <path id="pipe4" class="pipe animated" d="M950 176 C962 176, 962 176, 972 176"/>

  <circle class="dot" r="7">
    <animateMotion dur="2.4s" repeatCount="indefinite">
      <mpath href="#pipe1"/>
    </animateMotion>
  </circle>
  <circle class="dot" r="7">
    <animateMotion dur="2.4s" begin="0.6s" repeatCount="indefinite">
      <mpath href="#pipe2"/>
    </animateMotion>
  </circle>
  <circle class="token" r="7">
    <animateMotion dur="2.4s" begin="1.2s" repeatCount="indefinite">
      <mpath href="#pipe3"/>
    </animateMotion>
  </circle>
  <circle class="token" r="7">
    <animateMotion dur="2.4s" begin="1.8s" repeatCount="indefinite">
      <mpath href="#pipe4"/>
    </animateMotion>
  </circle>

  <path class="pipe animated" d="M462 214 C610 302, 760 302, 760 214"/>
  <text class="copy" x="528" y="320">overlay XML and PNGs join the base menu before final authoring</text>
</svg>
