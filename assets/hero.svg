<svg width="1200" height="320" viewBox="0 0 1200 320" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="hero-title hero-desc">
  <title id="hero-title">Spindle</title>
  <desc id="hero-desc">Desktop optical-disc authoring studio. A dark-themed banner with disc and track visualisation.</desc>

  <defs>
    <!-- Background gradient -->
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#050507"/>
      <stop offset="100%" stop-color="#0a1020"/>
    </linearGradient>

    <!-- Brand gradient: orange to pink to purple -->
    <linearGradient id="brand" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ffaa40"/>
      <stop offset="50%" stop-color="#f43f5e"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>

    <!-- Track beam: cyan -->
    <linearGradient id="track-beam" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#5aa2ff" stop-opacity="0"/>
      <stop offset="50%" stop-color="#5aa2ff" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#5aa2ff" stop-opacity="0"/>
    </linearGradient>

    <!-- Disc shimmer -->
    <linearGradient id="disc-shimmer" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#a78bfa" stop-opacity="0.15"/>
      <stop offset="50%" stop-color="#5aa2ff" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#ffaa40" stop-opacity="0.15"/>
    </linearGradient>

    <!-- Soft glow filter -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Subtle text glow -->
    <filter id="text-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="320" rx="18" fill="url(#bg)"/>

  <!-- Ambient glow circles -->
  <g opacity="0.08">
    <circle cx="950" cy="160" r="200" fill="#a78bfa"/>
    <circle cx="200" cy="80" r="150" fill="#ffaa40"/>
    <circle cx="600" cy="260" r="160" fill="#5aa2ff"/>
  </g>

  <!-- Subtle grid pattern -->
  <g opacity="0.04" stroke="#5aa2ff" stroke-width="0.5">
    <line x1="0" y1="80" x2="1200" y2="80"/>
    <line x1="0" y1="160" x2="1200" y2="160"/>
    <line x1="0" y1="240" x2="1200" y2="240"/>
    <line x1="300" y1="0" x2="300" y2="320"/>
    <line x1="600" y1="0" x2="600" y2="320"/>
    <line x1="900" y1="0" x2="900" y2="320"/>
  </g>

  <!-- Disc visualisation: concentric track rings -->
  <g transform="translate(950, 160)" opacity="0.5">
    <!-- Outer disc edge -->
    <circle r="130" fill="none" stroke="#2e3540" stroke-width="1"/>
    <!-- Track grooves -->
    <circle r="115" fill="none" stroke="url(#disc-shimmer)" stroke-width="0.8"/>
    <circle r="100" fill="none" stroke="#5aa2ff" stroke-width="0.5" opacity="0.2"/>
    <circle r="85" fill="none" stroke="#5aa2ff" stroke-width="0.5" opacity="0.25"/>
    <circle r="70" fill="none" stroke="#5aa2ff" stroke-width="0.5" opacity="0.3"/>
    <circle r="55" fill="none" stroke="#a78bfa" stroke-width="0.5" opacity="0.25"/>
    <circle r="40" fill="none" stroke="#a78bfa" stroke-width="0.5" opacity="0.2"/>
    <!-- Inner hub -->
    <circle r="18" fill="none" stroke="#2e3540" stroke-width="1.5"/>
    <circle r="3" fill="#2e3540"/>
  </g>

  <!-- Animated read head sweeping across disc -->
  <g transform="translate(950, 160)" filter="url(#glow)">
    <line x1="0" y1="0" x2="115" y2="0" stroke="#ffaa40" stroke-width="1.5" opacity="0.6">
      <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="12s" repeatCount="indefinite"/>
    </line>
    <circle r="3" fill="#ffaa40" opacity="0.9">
      <animateMotion dur="12s" repeatCount="indefinite">
        <mpath href="#read-orbit"/>
      </animateMotion>
    </circle>
  </g>
  <circle id="read-orbit-ref" cx="950" cy="160" r="90" fill="none"/>
  <path id="read-orbit" d="M1040 160 A90 90 0 1 1 1039.99 160" fill="none"/>

  <!-- Track timeline: horizontal bars representing titles -->
  <g transform="translate(80, 140)">
    <!-- Titleset tracks -->
    <rect x="0" y="0" width="220" height="6" rx="3" fill="#5aa2ff" opacity="0.35"/>
    <rect x="0" y="16" width="160" height="6" rx="3" fill="#5aa2ff" opacity="0.25"/>
    <rect x="0" y="32" width="280" height="6" rx="3" fill="#2ec66a" opacity="0.3"/>
    <rect x="0" y="48" width="120" height="6" rx="3" fill="#a78bfa" opacity="0.25"/>

    <!-- Chapter markers -->
    <g filter="url(#glow)">
      <circle cx="70" cy="3" r="3" fill="#ffaa40" opacity="0.8"/>
      <circle cx="150" cy="3" r="3" fill="#ffaa40" opacity="0.7"/>
      <circle cx="50" cy="19" r="3" fill="#ffaa40" opacity="0.7"/>
      <circle cx="120" cy="19" r="3" fill="#ffaa40" opacity="0.6"/>
      <circle cx="90" cy="35" r="3" fill="#ffaa40" opacity="0.8"/>
      <circle cx="180" cy="35" r="3" fill="#ffaa40" opacity="0.7"/>
      <circle cx="240" cy="35" r="3" fill="#ffaa40" opacity="0.6"/>
    </g>

    <!-- Track labels -->
    <text x="230" y="7" fill="#5aa2ff" font-size="10" font-family="monospace" opacity="0.5">title 1</text>
    <text x="170" y="23" fill="#5aa2ff" font-size="10" font-family="monospace" opacity="0.5">title 2</text>
    <text x="290" y="39" fill="#2ec66a" font-size="10" font-family="monospace" opacity="0.5">title 3</text>
    <text x="130" y="55" fill="#a78bfa" font-size="10" font-family="monospace" opacity="0.5">menu</text>
  </g>

  <!-- Animated particle along a title track -->
  <path id="track-path" d="M80 143 L300 143" fill="none"/>
  <circle r="3" fill="#5aa2ff" opacity="0.7">
    <animateMotion dur="3s" repeatCount="indefinite" keyPoints="0;1" keyTimes="0;1" calcMode="linear">
      <mpath href="#track-path"/>
    </animateMotion>
  </circle>

  <!-- Title -->
  <text x="80" y="68" font-size="42" font-family="'Space Grotesk', 'Inter', system-ui, sans-serif" font-weight="700" letter-spacing="-0.02em" fill="url(#brand)" filter="url(#text-glow)">Spindle</text>

  <!-- Tagline -->
  <text x="82" y="96" fill="#b4bfce" font-size="16" font-family="'Inter', system-ui, sans-serif">Desktop optical-disc authoring studio</text>

  <!-- Tech badge -->
  <g transform="translate(920, 42)">
    <rect width="200" height="38" rx="10" fill="#0f1520" stroke="#2e3540" stroke-width="1"/>
    <text x="16" y="25" font-size="14" font-family="monospace">
      <tspan fill="#7c8796">tauri</tspan><tspan fill="#2e3540"> + </tspan><tspan fill="#5aa2ff">react</tspan><tspan fill="#2e3540"> + </tspan><tspan fill="#ffaa40">rust</tspan>
    </text>
  </g>

  <!-- Bottom info line -->
  <text x="80" y="290" fill="#7c8796" font-size="13" font-family="monospace">
    <tspan fill="#9aa4b2">titles</tspan>
    <tspan fill="#2e3540"> | </tspan>
    <tspan fill="#9aa4b2">chapters</tspan>
    <tspan fill="#2e3540"> | </tspan>
    <tspan fill="#9aa4b2">menus</tspan>
    <tspan fill="#2e3540"> | </tspan>
    <tspan fill="#9aa4b2">subtitles</tspan>
    <tspan fill="#2e3540">  &#x2022;  </tspan>
    <tspan fill="#7c8796">Liminal HQ</tspan>
  </text>
</svg>
