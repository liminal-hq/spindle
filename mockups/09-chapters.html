		<style>
			body {
				background: var(--bg-panel);
			}

			.chapters-layout {
				display: grid;
				grid-template-columns: 1fr 260px;
				gap: var(--space-6);
				max-width: 1000px;
			}

			/* -- Visual Timeline -- */
			.chapter-timeline {
				position: relative;
				height: 80px;
				background: var(--bg-card);
				border: 1px solid var(--border-subtle);
				border-radius: var(--radius-lg);
				overflow: hidden;
				margin-bottom: var(--space-6);
			}

			.chapter-timeline__waveform {
				position: absolute;
				inset: 0;
				display: flex;
				align-items: flex-end;
				padding: 0 12px;
				gap: 1px;
			}
			.chapter-timeline__bar {
				flex: 1;
				background: rgba(255, 170, 64, 0.15);
				border-radius: 1px 1px 0 0;
				min-height: 2px;
			}

			.chapter-timeline__markers {
				position: absolute;
				inset: 0;
				pointer-events: none;
			}
			.chapter-timeline__pin {
				position: absolute;
				top: 0;
				bottom: 0;
				width: 2px;
				background: var(--brand-orange);
				pointer-events: auto;
				cursor: col-resize;
			}
			.chapter-timeline__pin::before {
				content: '';
				position: absolute;
				top: 0;
				left: -4px;
				width: 10px;
				height: 10px;
				background: var(--brand-orange);
				border-radius: 50%;
				box-shadow: 0 0 8px rgba(255, 170, 64, 0.4);
			}
			.chapter-timeline__pin-label {
				position: absolute;
				bottom: 4px;
				left: 6px;
				font-size: 9px;
				font-family: var(--font-mono);
				color: var(--brand-orange);
				white-space: nowrap;
				text-shadow: 0 1px 3px rgba(0, 0, 0, 0.6);
			}

			.chapter-timeline__playhead {
				position: absolute;
				top: 0;
				bottom: 0;
				width: 2px;
				background: var(--brand-pink);
				z-index: 2;
			}
			.chapter-timeline__playhead::before {
				content: '';
				position: absolute;
				top: -2px;
				left: -5px;
				width: 12px;
				height: 12px;
				background: var(--brand-pink);
				clip-path: polygon(50% 100%, 0 0, 100% 0);
			}

			/* -- Timecodes ruler -- */
			.chapter-ruler {
				display: flex;
				justify-content: space-between;
				padding: 0 12px;
				margin-top: var(--space-1);
				margin-bottom: var(--space-4);
				font-size: 9px;
				font-family: var(--font-mono);
				color: var(--text-muted);
			}

			/* -- Chapter list -- */
			.chapter-item {
				display: grid;
				grid-template-columns: 32px 1fr 110px 80px;
				align-items: center;
				gap: var(--space-3);
				padding: var(--space-3);
				border: 1px solid var(--border-subtle);
				border-radius: var(--radius-md);
				margin-bottom: var(--space-2);
				background: rgba(255, 255, 255, 0.015);
				cursor: pointer;
				transition: all var(--transition-fast);
			}
			.chapter-item:hover {
				border-color: var(--border-default);
				background: var(--bg-card-hover);
			}
			.chapter-item--active {
				border-color: rgba(255, 170, 64, 0.3);
				background: rgba(255, 170, 64, 0.04);
			}

			.chapter-num {
				width: 28px;
				height: 28px;
				border-radius: 6px;
				background: rgba(255, 170, 64, 0.1);
				display: flex;
				align-items: center;
				justify-content: center;
				font-family: var(--font-mono);
				font-size: var(--text-xs);
				font-weight: 700;
				color: var(--brand-orange);
			}

			.chapter-name-input {
				background: transparent;
				border: 1px solid transparent;
				border-radius: var(--radius-sm);
				padding: 2px 6px;
				font-size: var(--text-sm);
				font-weight: 500;
				color: var(--text-primary);
				font-family: var(--font-body);
				width: 100%;
				transition: border-color var(--transition-fast);
			}
			.chapter-name-input:hover {
				border-color: var(--border-subtle);
			}
			.chapter-name-input:focus {
				outline: none;
				border-color: var(--brand-orange);
				background: var(--bg-input);
			}

			.chapter-time {
				font-family: var(--font-mono);
				font-size: var(--text-sm);
				color: var(--brand-orange);
				background: var(--bg-input);
				border: 1px solid var(--border-subtle);
				border-radius: var(--radius-sm);
				padding: 2px 8px;
				text-align: center;
			}

			.chapter-actions {
				display: flex;
				gap: var(--space-1);
				opacity: 0;
				transition: opacity var(--transition-fast);
			}
			.chapter-item:hover .chapter-actions {
				opacity: 1;
			}

			/* -- Sidebar: Chapter thumb preview -- */
			.chapter-preview {
				background: var(--bg-card);
				border: 1px solid var(--border-subtle);
				border-radius: var(--radius-lg);
				overflow: hidden;
				margin-bottom: var(--space-4);
			}
			.chapter-preview__thumb {
				width: 100%;
				height: 140px;
				background: linear-gradient(135deg, #1a1520 0%, #2d1f35 50%, #1a2030 100%);
				display: flex;
				align-items: center;
				justify-content: center;
			}
			.chapter-preview__info {
				padding: var(--space-3);
			}

			.breadcrumb {
				display: flex;
				align-items: center;
				gap: var(--space-1);
				margin-bottom: var(--space-4);
				font-size: var(--text-sm);
			}
			.breadcrumb a {
				color: var(--text-muted);
			}
			.breadcrumb__sep {
				color: var(--text-muted);
			}
			.breadcrumb__current {
				color: var(--text-primary);
				font-weight: 500;
			}
		</style>
	</head>
