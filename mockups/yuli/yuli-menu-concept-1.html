<!doctype html>
<html lang="en-CA">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=1280" />
		<title>Spindle — Concept 1: The "Zen" Scene Editor</title>
		<link rel="stylesheet" href="design-system.css" />
		<link
			href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap"
			rel="stylesheet"
		/>
		<style>
			body {
				background: var(--bg-app);
				overflow: hidden;
				display: flex;
				flex-direction: column;
				height: 100vh;
			}

			.editor-layout {
				display: grid;
				grid-template-columns: 280px 1fr;
				flex: 1;
				overflow: hidden;
			}

			/* -- Scene Hierarchy (Left) -- */
			.scene-hierarchy {
				background: var(--bg-sidebar);
				border-right: 1px solid var(--border-subtle);
				display: flex;
				flex-direction: column;
				padding: var(--space-4);
			}

			.hierarchy-header {
				font-size: var(--text-xs);
				font-weight: 600;
				letter-spacing: 0.08em;
				color: var(--text-muted);
				margin-bottom: var(--space-4);
				display: flex;
				justify-content: space-between;
				align-items: center;
			}

			.layer-item {
				display: flex;
				align-items: center;
				gap: var(--space-2);
				padding: var(--space-2) var(--space-3);
				font-size: var(--text-sm);
				color: var(--text-secondary);
				border-radius: var(--radius-sm);
				cursor: pointer;
				transition: background var(--transition-fast);
				margin-bottom: 2px;
			}
			.layer-item:hover {
				background: rgba(255, 255, 255, 0.04);
			}
			.layer-item--active {
				background: rgba(255, 170, 64, 0.1);
				color: var(--brand-orange);
			}
			.layer-item--group {
				font-weight: 500;
				color: var(--text-primary);
			}

			/* -- Canvas area -- */
			.canvas-area {
				display: flex;
				flex-direction: column;
				position: relative;
			}

			.canvas-header {
				display: flex;
				align-items: center;
				justify-content: center;
				gap: var(--space-4);
				padding: var(--space-3);
				background: transparent;
				position: absolute;
				top: 0;
				left: 0;
				right: 0;
				z-index: 10;
				pointer-events: none;
			}

			.format-pill {
				pointer-events: auto;
				background: rgba(20, 20, 25, 0.85);
				backdrop-filter: blur(12px);
				border: 1px solid var(--border-subtle);
				border-radius: 20px;
				padding: 4px;
				display: flex;
				gap: 4px;
				box-shadow: var(--shadow-card);
			}

			.format-pill__option {
				padding: 4px 16px;
				border-radius: 16px;
				font-size: var(--text-xs);
				font-weight: 600;
				cursor: pointer;
				color: var(--text-muted);
				transition: all var(--transition-fast);
			}

			.format-pill__option--active {
				background: var(--brand-orange);
				color: var(--text-inverse);
			}

			.canvas-viewport {
				flex: 1;
				display: flex;
				align-items: center;
				justify-content: center;
				background: #0a0a0e;
				background-image: radial-gradient(
					circle at 50% 50%,
					rgba(255, 170, 64, 0.03) 0%,
					transparent 60%
				);
				padding: var(--space-8);
			}

			.menu-canvas {
				width: 720px;
				height: 480px;
				position: relative;
				border-radius: 8px;
				overflow: hidden;
				box-shadow: 0 12px 48px rgba(0, 0, 0, 0.6);
				background: linear-gradient(135deg, #161622 0%, #232336 100%);
			}

			.menu-canvas__title {
				position: absolute;
				top: 15%;
				width: 100%;
				text-align: center;
				font-family: var(--font-heading);
				font-size: 28px;
				font-weight: 700;
				color: #fff;
				letter-spacing: -0.02em;
			}

			.btn-node {
				position: absolute;
				background: rgba(255, 255, 255, 0.05);
				border: 1px solid rgba(255, 255, 255, 0.1);
				border-radius: 6px;
				display: flex;
				align-items: center;
				padding: 0 16px;
				font-family: var(--font-body);
				font-size: 14px;
				color: var(--text-primary);
				cursor: pointer;
			}
			.btn-node--active {
				background: rgba(255, 170, 64, 0.15);
				border-color: var(--brand-orange);
				box-shadow: 0 0 0 1px var(--brand-orange);
			}

			/* -- Floating Contextual Action Island -- */
			.action-island {
				position: absolute;
				bottom: var(--space-8);
				left: 50%;
				transform: translateX(-50%);
				background: rgba(20, 20, 28, 0.85);
				backdrop-filter: blur(16px);
				border: 1px solid var(--border-default);
				border-radius: 12px;
				padding: var(--space-3) var(--space-4);
				display: flex;
				align-items: center;
				gap: var(--space-4);
				box-shadow: var(--shadow-panel);
				z-index: 20;
				animation: fade-in 0.3s ease;
			}

			.island-group {
				display: flex;
				align-items: center;
				gap: var(--space-2);
			}

			.island-divider {
				width: 1px;
				height: 24px;
				background: var(--border-subtle);
			}
		</style>
	</head>
	<body>
		<div class="topbar">
			<div class="topbar__logo">Spindle</div>
			<div class="text-sm text-muted">/ Wedding Highlights / Main Menu</div>
			<div class="topbar__actions">
				<button class="btn btn--sm btn--primary">Build ISO</button>
			</div>
		</div>

		<div class="editor-layout">
			<!-- Scene Hierarchy -->
			<div class="scene-hierarchy">
				<div class="hierarchy-header">
					<span>Authored Scene</span>
					<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>
				</div>
				<div class="layer-item layer-item--group">
					<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
					Background Audio
				</div>
				<div class="layer-item mt-2">
					<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/></svg>
					Title Image
				</div>
				<div class="layer-item">
					<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="4 7 4 4 20 4 20 7"/><line x1="9" y1="20" x2="15" y2="20"/><line x1="12" y1="4" x2="12" y2="20"/></svg>
					Main Title Text
				</div>
				<div class="hierarchy-header mt-6">
					<span>Interactive Nodes</span>
				</div>
				<div class="layer-item layer-item--active">
					<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polygon points="10 8 16 12 10 16 10 8"/></svg>
					Play Ceremony
				</div>
				<div class="layer-item">
					<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polygon points="10 8 16 12 10 16 10 8"/></svg>
					Play Reception
				</div>
				<div class="layer-item">
					<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="9" y1="21" x2="9" y2="9"/></svg>
					Chapter Select
				</div>
			</div>

			<!-- Canvas Area -->
			<div class="canvas-area">
				<div class="canvas-header">
					<div class="format-pill">
						<div class="format-pill__option format-pill__option--active">DVD (4:3 Safe)</div>
						<div class="format-pill__option">Blu-ray (16:9)</div>
					</div>
				</div>

				<div class="canvas-viewport">
					<div class="menu-canvas">
						<div class="menu-canvas__title">Wedding Highlights</div>
						
						<div class="btn-node btn-node--active" style="left: 200px; top: 200px; width: 320px; height: 48px;">
							▶ Play Ceremony
						</div>
						<div class="btn-node" style="left: 200px; top: 260px; width: 320px; height: 48px;">
							▶ Play Reception
						</div>
						<div class="btn-node" style="left: 200px; top: 320px; width: 320px; height: 48px;">
							◆ Chapter Select
						</div>
					</div>
				</div>

				<!-- Progressive Disclosure: Floating Action Island instead of a dense inspector -->
				<div class="action-island">
					<div class="island-group">
						<span class="text-xs text-muted font-bold tracking-wider">Selected: Play Ceremony</span>
					</div>
					<div class="island-divider"></div>
					<div class="island-group">
						<span class="text-sm">Action:</span>
						<select class="input input--select input--sm" style="width: 200px;">
							<option>Play Title 1 (Ceremony)</option>
							<option>Play Title 2 (Reception)</option>
							<option>Go to Menu...</option>
						</select>
					</div>
					<div class="island-divider"></div>
					<div class="island-group">
						<button class="btn btn--ghost btn--sm">
							<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
							Edit Style
						</button>
						<button class="btn btn--ghost btn--sm">
							<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="3 11 22 2 13 21 11 13 3 11"/></svg>
							Routing
						</button>
					</div>
				</div>
			</div>
		</div>
	</body>
</html>
