<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Spindle Mark E — "Geometric Spindle"
       A minimal, icon-ready mark. Side profile of a spindle holding
       stacked discs — the classic disc spindle/cake-box silhouette.
       Clean geometric shapes, strong at small sizes. -->
  <defs>
    <linearGradient id="geoGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F19B18"/>
      <stop offset="100%" stop-color="#CF5D22"/>
    </linearGradient>
    <linearGradient id="geoGrad2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#CF5D22"/>
      <stop offset="100%" stop-color="#5D3147"/>
    </linearGradient>
    <linearGradient id="shaftGeo" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F7E2BA"/>
      <stop offset="40%" stop-color="#F19B18"/>
      <stop offset="100%" stop-color="#CF5D22"/>
    </linearGradient>
    <linearGradient id="baseGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#CF5D22" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#5D3147" stop-opacity="0.4"/>
    </linearGradient>
    <radialGradient id="geoGlow" cx="50%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#F7E2BA" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#0A0A0D" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" fill="#0A0A0D" rx="64"/>

  <!-- Ambient glow -->
  <ellipse cx="256" cy="280" rx="200" ry="160" fill="url(#geoGlow)"/>

  <!-- Base platform (ellipse, viewed at angle) -->
  <ellipse cx="256" cy="400" rx="160" ry="28" fill="none" stroke="url(#baseGrad)" stroke-width="2"/>

  <!-- Central spindle shaft -->
  <line x1="256" y1="100" x2="256" y2="400" stroke="url(#shaftGeo)" stroke-width="4" stroke-linecap="round"/>

  <!-- Stacked discs (ellipses at slight perspective) — each disc is a pair of ellipses -->
  <!-- Disc 1 (bottom) -->
  <ellipse cx="256" cy="360" rx="130" ry="22" fill="none" stroke="url(#geoGrad2)" stroke-width="2.5"/>
  <ellipse cx="256" cy="360" rx="30" ry="5" fill="none" stroke="#CF5D22" stroke-width="1" opacity="0.5"/>

  <!-- Disc 2 -->
  <ellipse cx="256" cy="310" rx="130" ry="22" fill="none" stroke="url(#geoGrad)" stroke-width="2.5" opacity="0.85"/>
  <ellipse cx="256" cy="310" rx="30" ry="5" fill="none" stroke="#F19B18" stroke-width="1" opacity="0.4"/>

  <!-- Disc 3 -->
  <ellipse cx="256" cy="260" rx="130" ry="22" fill="none" stroke="url(#geoGrad)" stroke-width="2.5" opacity="0.7"/>
  <ellipse cx="256" cy="260" rx="30" ry="5" fill="none" stroke="#F19B18" stroke-width="1" opacity="0.35"/>

  <!-- Disc 4 (top — the "current" disc being authored, brighter) -->
  <ellipse cx="256" cy="210" rx="130" ry="22" fill="none" stroke="#F19B18" stroke-width="3"/>
  <ellipse cx="256" cy="210" rx="90" ry="15" fill="none" stroke="#F19B18" stroke-width="0.5" opacity="0.2"/>
  <ellipse cx="256" cy="210" rx="60" ry="10" fill="none" stroke="#F19B18" stroke-width="0.5" opacity="0.15"/>
  <ellipse cx="256" cy="210" rx="30" ry="5" fill="none" stroke="#F7E2BA" stroke-width="1.5" opacity="0.6"/>

  <!-- Glow on top disc -->
  <ellipse cx="256" cy="210" rx="135" ry="24" fill="none" stroke="#F7E2BA" stroke-width="0.5" opacity="0.15"/>

  <!-- Spindle top cap -->
  <circle cx="256" cy="100" r="8" fill="#F7E2BA" opacity="0.8"/>
  <circle cx="256" cy="100" r="12" fill="none" stroke="#F19B18" stroke-width="1.5" opacity="0.5"/>

  <!-- Highlight on cap -->
  <circle cx="254" cy="98" r="2.5" fill="white" opacity="0.4"/>
</svg>
